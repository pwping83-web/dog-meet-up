<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>댕댕마켓 — 비밀번호 재설정</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f4f5;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(15,23,42,0.08);">
          <tr>
            <td style="background:linear-gradient(135deg,#f97316 0%,#facc15 100%);padding:28px 24px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:800;">비밀번호 재설정</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 28px 8px;">
              <p style="margin:0;font-size:15px;line-height:1.65;color:#475569;">비밀번호를 바꾸려면 아래 버튼을 눌러 주세요.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 28px 32px;text-align:center;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:16px 36px;background:linear-gradient(90deg,#f97316,#eab308);color:#ffffff;text-decoration:none;font-size:16px;font-weight:800;border-radius:14px;">
                재설정 링크 열기
              </a>
              <p style="margin:20px 0 0;font-size:12px;color:#94a3b8;word-break:break-all;">
                <a href="{{ .ConfirmationURL }}" style="color:#f97316;">{{ .ConfirmationURL }}</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>댕댕마켓 — 이메일 인증</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f4f5;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(15,23,42,0.08);">
          <tr>
            <td style="background:linear-gradient(135deg,#f97316 0%,#facc15 100%);padding:28px 24px;text-align:center;">
              <div style="font-size:36px;line-height:1;margin-bottom:8px;">🐕</div>
              <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:800;letter-spacing:-0.02em;">댕댕마켓</h1>
              <p style="margin:8px 0 0;color:rgba(255,255,255,0.95);font-size:14px;font-weight:600;">우리 동네 댕친 · 모임 · 돌봄</p>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 28px 24px;">
              <p style="margin:0 0 8px;font-size:15px;font-weight:700;color:#0f172a;">안녕하세요!</p>
              <p style="margin:0;font-size:15px;line-height:1.65;color:#475569;">
                가입을 환영해요. 아래 버튼을 눌러 <strong style="color:#ea580c;">이메일 주소를 인증</strong>해 주세요.
              </p>
              <p style="margin:16px 0 0;font-size:13px;color:#64748b;">
                가입하신 주소: <span style="font-weight:700;color:#334155;">{{ .Email }}</span>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 28px 32px;text-align:center;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:16px 36px;background:linear-gradient(90deg,#f97316,#eab308);color:#ffffff;text-decoration:none;font-size:16px;font-weight:800;border-radius:14px;box-shadow:0 4px 14px rgba(249,115,22,0.35);">
                이메일 인증하기
              </a>
              <p style="margin:20px 0 0;font-size:12px;line-height:1.6;color:#94a3b8;">
                버튼이 동작하지 않으면 아래 링크를 브라우저에 붙여 넣으세요.<br />
                <a href="{{ .ConfirmationURL }}" style="color:#f97316;word-break:break-all;">{{ .ConfirmationURL }}</a>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px 24px;border-top:1px solid #f1f5f9;text-align:center;">
              <p style="margin:0;font-size:11px;color:#cbd5e1;line-height:1.5;">
                본인이 요청한 가입이 아니라면 이 메일을 무시하셔도 됩니다.<br />
                © 댕댕마켓
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
